<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影像上传测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }
        .upload-form {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .images-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .images-table th, .images-table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        .images-table th {
            background: #007bff;
            color: white;
        }
        .images-table tr:nth-child(even) {
            background: #f9f9f9;
        }
        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>影像管理系统</h1>

    <!-- 上传表单 -->
    <div class="upload-form">
        <h2>上传影像</h2>
        <form id="uploadForm">
            <div class="form-group">
                <label for="image_name">影像名称 *</label>
                <input type="text" id="image_name" name="image_name" required>
            </div>

            <div class="form-group">
                <label for="resolution">分辨率（米）*</label>
                <input type="number" id="resolution" name="resolution" step="0.01" required>
            </div>

            <div class="form-group">
                <label for="capture_date">拍摄日期 *</label>
                <input type="date" id="capture_date" name="capture_date" required>
            </div>

            <div class="form-group">
                <label for="satellite">卫星名称 *</label>
                <input type="text" id="satellite" name="satellite" required>
            </div>

            <div class="form-group">
                <label for="type">影像类型 *</label>
                <select id="type" name="type" required>
                    <option value="">请选择</option>
                    <option value="dom">DOM</option>
                    <option value="dsm">DSM</option>
                    <option value="other">其他</option>
                </select>
            </div>

            <div class="form-group">
                <label for="region_code">区域代码 *</label>
                <input type="text" id="region_code" name="region_code" required>
            </div>

            <div class="form-group">
                <label for="image_file">影像文件 *</label>
                <input type="file" id="image_file" name="image_file" required>
            </div>

            <div class="form-group">
                <label for="shp_files">边界文件（可选，支持多选）</label>
                <input type="file" id="shp_files" name="shp_files" multiple>
            </div>

            <button type="submit">上传</button>
        </form>
        <div id="uploadStatus"></div>
    </div>

    <!-- 影像列表 -->
    <div>
        <h2>影像列表</h2>
        <button onclick="loadImages()">刷新列表</button>
        <table class="images-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>影像名称</th>
                    <th>分辨率</th>
                    <th>拍摄日期</th>
                    <th>卫星</th>
                    <th>类型</th>
                    <th>区域代码</th>
                    <th>上传时间</th>
                </tr>
            </thead>
            <tbody id="imagesTableBody">
                <tr><td colspan="8" style="text-align: center;">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';

        // 上传表单提交
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('image_name', document.getElementById('image_name').value);
            formData.append('resolution', document.getElementById('resolution').value);
            formData.append('capture_date', document.getElementById('capture_date').value);
            formData.append('satellite', document.getElementById('satellite').value);
            formData.append('type', document.getElementById('type').value);
            formData.append('region_code', document.getElementById('region_code').value);

            // 添加影像文件
            const imageFile = document.getElementById('image_file').files[0];
            if (imageFile) {
                formData.append('image_file', imageFile);
            }

            // 添加shapefile文件
            const shpFiles = document.getElementById('shp_files').files;
            for (let i = 0; i < shpFiles.length; i++) {
                formData.append('shp_files', shpFiles[i]);
            }

            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.innerHTML = '<div class="status">上传中...</div>';

            try {
                const response = await fetch(`${API_BASE_URL}/images/upload`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.innerHTML = `<div class="status success">上传成功！影像ID: ${result.data.id}</div>`;
                    document.getElementById('uploadForm').reset();
                    loadImages(); // 刷新列表
                } else {
                    statusDiv.innerHTML = `<div class="status error">上传失败: ${result.detail || '未知错误'}</div>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">网络错误: ${error.message}</div>`;
            }
        });

        // 加载影像列表
        async function loadImages() {
            const tbody = document.getElementById('imagesTableBody');
            tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">加载中...</td></tr>';

            try {
                const response = await fetch(`${API_BASE_URL}/images/list`);
                const images = await response.json();

                if (images.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">暂无数据</td></tr>';
                    return;
                }

                tbody.innerHTML = images.map(img => `
                    <tr>
                        <td>${img.id}</td>
                        <td>${img.image_name}</td>
                        <td>${img.resolution || '-'}</td>
                        <td>${img.capture_date || '-'}</td>
                        <td>${img.satellite || '-'}</td>
                        <td>${img.image_type || '-'}</td>
                        <td>${img.region_code || '-'}</td>
                        <td>${img.upload_time ? new Date(img.upload_time).toLocaleString('zh-CN') : '-'}</td>
                    </tr>
                `).join('');
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align: center; color: red;">加载失败: ${error.message}</td></tr>`;
            }
        }

        // 页面加载时获取影像列表
        loadImages();
    </script>
</body>
</html>
